name: Test invalid role session name validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action-too-short
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          role-session-name: "x"  # Only 1 character, minimum is 2

      - name: Assert action failed for too-short session name
        env:
          OUTCOME: ${{ steps.action-too-short.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with too-short role session name, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with role session name that is too short"

      - id: action-invalid-chars
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          role-session-name: "invalid session name!"  # Contains invalid characters (space and !)

      - name: Assert action failed for invalid characters in session name
        env:
          OUTCOME: ${{ steps.action-invalid-chars.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid characters in role session name, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid characters in role session name"
