name: Test valid region format passes regex validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "ap-southeast-2"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          disable-retry: "true"
          retry-max-attempts: "1"

      - name: Assert action did not fail due to region format
        run: |
          echo "AWS_REGION: $AWS_REGION"
          # The region should be exported even if the action fails later due to invalid credentials
          if [ "$AWS_REGION" != "ap-southeast-2" ]; then
            echo "FAIL: expected AWS_REGION to be 'ap-southeast-2', got '$AWS_REGION'"
            exit 1
          fi
          echo "PASS: valid region 'ap-southeast-2' passed regex validation and was exported"

      - name: Assert AWS_DEFAULT_REGION was also exported
        run: |
          echo "AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION"
          if [ "$AWS_DEFAULT_REGION" != "ap-southeast-2" ]; then
            echo "FAIL: expected AWS_DEFAULT_REGION to be 'ap-southeast-2', got '$AWS_DEFAULT_REGION'"
            exit 1
          fi
          echo "PASS: AWS_DEFAULT_REGION correctly set to ap-southeast-2"
