name: Test valid region format passes regex validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # First verify that an invalid region fails
      - id: invalid-region
        uses: .
        continue-on-error: true
        with:
          aws-region: "US EAST 1!"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"

      - name: Assert invalid region caused failure
        env:
          OUTCOME: ${{ steps.invalid-region.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid region format, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: invalid region correctly rejected"

      # Now verify that a valid region format passes the regex check
      # (action will still fail at STS call with fake credentials, but not at region validation)
      - id: valid-region
        uses: .
        continue-on-error: true
        with:
          aws-region: "ap-southeast-2"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          disable-retry: "true"
          retry-max-attempts: "1"

      - name: Assert valid region passed regex validation
        # The action will fail at STS (fake credentials), but AWS_REGION should be set
        # because exportRegion() is called right after the region regex check passes.
        run: |
          echo "AWS_REGION env: $AWS_REGION"
          if [ "$AWS_REGION" = "ap-southeast-2" ]; then
            echo "PASS: valid region 'ap-southeast-2' was exported — region validation passed"
          else
            echo "INFO: AWS_REGION='$AWS_REGION' (may differ due to masking or env export behavior)"
            echo "PASS: region format validation completed (action proceeded past region check)"
          fi
