name: Test invalid role session name characters validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          role-session-name: "invalid session name!"
          # role-session-name must match /^[\w+=,.@-]*$/ — spaces and '!' are not allowed
      - name: Assert action failed due to invalid role session name characters
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid role session name characters, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed for role session name with invalid characters"
