name: Test role-chaining, special-characters-workaround, use-existing-credentials, overwrite-aws-profile, and web-identity-token-file inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a fake web identity token file
        run: |
          echo "fake-web-identity-token-for-testing" > /tmp/fake-web-identity-token.txt

      - name: Run action with advanced credential options
        id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          role-to-assume: arn:aws:iam::123456789012:role/TestRole
          role-chaining: "false"
          special-characters-workaround: "false"
          use-existing-credentials: "false"
          aws-profile: test-profile
          overwrite-aws-profile: "true"
          web-identity-token-file: /tmp/fake-web-identity-token.txt
          disable-retry: "true"

      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should attempt to run (and fail at AWS API with fake creds).
          # A 'skipped' outcome means the action never started — that would be a bug.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped — it never ran"
            exit 1
          fi
          echo "PASS: action ran with advanced credential options (outcome=$OUTCOME)"
