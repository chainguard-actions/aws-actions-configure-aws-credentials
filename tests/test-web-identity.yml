name: Test web identity and proxy inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create fake web identity token file
        run: |
          mkdir -p /tmp/aws-test
          echo "fake-web-identity-token" > /tmp/aws-test/web-identity-token
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: eu-west-1
          role-to-assume: arn:aws:iam::123456789012:role/WebIdentityRole
          web-identity-token-file: /tmp/aws-test/web-identity-token
          audience: sts.amazonaws.com
          http-proxy: "http://proxy.example.com:3128"
          no-proxy: "169.254.169.254,s3.amazonaws.com"
          disable-retry: "true"
      - name: Assert action ran
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome: ${{ steps.action.outcome }})"
