name: Test output-credentials flag with mock STS endpoint
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Start a minimal mock STS server that returns a fake GetCallerIdentity response
      - name: Start mock STS server
        run: |
          mkdir -p /tmp/mock-sts
          cat > /tmp/mock-sts/server.py << 'EOF'
          import http.server
          import socketserver

          RESPONSE = """<?xml version="1.0" encoding="UTF-8"?>
          <GetCallerIdentityResponse xmlns="https://sts.amazonaws.com/doc/2011-06-15/">
            <GetCallerIdentityResult>
              <Arn>arn:aws:iam::123456789012:user/test-user</Arn>
              <UserId>AKIAIOSFODNN7EXAMPLE</UserId>
              <Account>123456789012</Account>
            </GetCallerIdentityResult>
            <ResponseMetadata>
              <RequestId>01234567-89ab-cdef-0123-456789abcdef</RequestId>
            </ResponseMetadata>
          </GetCallerIdentityResponse>"""

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length)
                  self.send_response(200)
                  self.send_header('Content-Type', 'text/xml')
                  self.end_headers()
                  self.wfile.write(RESPONSE.encode())
              def log_message(self, format, *args):
                  pass

          with socketserver.TCPServer(("", 4567), Handler) as httpd:
              httpd.serve_forever()
          EOF
          python3 /tmp/mock-sts/server.py &
          sleep 1
          echo "Mock STS server started on port 4567"

      - id: action
        uses: .
        with:
          aws-region: eu-west-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          sts-endpoint: http://localhost:4567
          output-credentials: "true"
          mask-aws-account-id: "false"

      - name: Assert aws-access-key-id output is set
        env:
          KEY_ID: ${{ steps.action.outputs.aws-access-key-id }}
        run: |
          echo "aws-access-key-id output: $KEY_ID"
          if [ -z "$KEY_ID" ]; then
            echo "FAIL: expected aws-access-key-id output to be set, but it was empty"
            exit 1
          fi
          echo "PASS: aws-access-key-id output is set"

      - name: Assert aws-secret-access-key output is set
        env:
          SECRET_KEY: ${{ steps.action.outputs.aws-secret-access-key }}
        run: |
          echo "aws-secret-access-key output is set: $([ -n "$SECRET_KEY" ] && echo yes || echo no)"
          if [ -z "$SECRET_KEY" ]; then
            echo "FAIL: expected aws-secret-access-key output to be set, but it was empty"
            exit 1
          fi
          echo "PASS: aws-secret-access-key output is set"

      - name: Assert AWS_REGION is set to eu-west-1
        run: |
          echo "AWS_REGION: $AWS_REGION"
          if [ "$AWS_REGION" != "eu-west-1" ]; then
            echo "FAIL: expected AWS_REGION to be 'eu-west-1', got '$AWS_REGION'"
            exit 1
          fi
          echo "PASS: AWS_REGION is correctly set to eu-west-1"
