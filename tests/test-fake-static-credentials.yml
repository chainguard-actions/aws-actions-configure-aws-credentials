name: Test fake static credentials reach AWS auth
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with fake static credentials (expect AWS auth failure, not validation failure)
        id: action
        uses: .
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          disable-retry: "true"
        continue-on-error: true
      - name: Assert action failed (AWS auth error, not input validation error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake credentials (AWS auth error), got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed at AWS authentication stage (credentials were accepted as valid input)"
