name: Test no credentials provided
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: configure-aws
        name: Configure AWS credentials with no credentials (expected to fail)
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1

      - name: Assert action failed due to no credentials
        env:
          OUTCOME: ${{ steps.configure-aws.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when no credentials are provided, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when no credentials are provided"
