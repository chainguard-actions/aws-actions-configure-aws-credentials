name: Test role assumption inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::123456789012:role/ExampleRole
          role-duration-seconds: "3600"
          role-external-id: example-external-id
          role-session-name: TestSession
          role-skip-session-tagging: "true"
          transitive-tag-keys: "key1,key2"
          inline-session-policy: '{"Version":"2012-10-17","Statement":[]}'
          managed-session-policies: "arn:aws:iam::aws:policy/ReadOnlyAccess"
          role-chaining: "false"
          special-characters-workaround: "false"
          use-existing-credentials: "false"
          disable-retry: "true"
      - name: Assert action ran
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome: ${{ steps.action.outcome }})"
