name: Test http-proxy and no-proxy inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          http-proxy: "http://proxy.example.com:3128"
          no-proxy: "localhost,127.0.0.1"
          disable-retry: "true"
          retry-max-attempts: "1"
      - name: Assert action ran with proxy inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Action will fail due to fake credentials, but it should have accepted the inputs
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake credentials, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly processed http-proxy and no-proxy inputs"
