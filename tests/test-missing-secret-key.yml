name: Test missing secret key validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          # aws-secret-access-key intentionally omitted
      - name: Assert action failed due to missing secret key
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when secret key is missing, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when aws-secret-access-key was not provided"
