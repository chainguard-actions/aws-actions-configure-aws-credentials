name: Test unset-current-credentials clears existing credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: "OLDACCESSKEYID"
      AWS_SECRET_ACCESS_KEY: "OLDSECRETACCESSKEY"
      AWS_SESSION_TOKEN: "OLDSESSIONTOKEN"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Verify old credentials are set
        run: |
          echo "AWS_ACCESS_KEY_ID is set: ${AWS_ACCESS_KEY_ID:+yes}"
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "FAIL: expected AWS_ACCESS_KEY_ID to be set before action runs"
            exit 1
          fi
          echo "PASS: old credentials are present"

      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          unset-current-credentials: "true"
          # No new credentials provided — action will fail after unsetting old ones

      - name: Assert old credentials were cleared
        run: |
          echo "AWS_ACCESS_KEY_ID after unset: '${AWS_ACCESS_KEY_ID}'"
          echo "AWS_SECRET_ACCESS_KEY after unset: '${AWS_SECRET_ACCESS_KEY}'"
          echo "AWS_SESSION_TOKEN after unset: '${AWS_SESSION_TOKEN}'"
          if [ -n "$AWS_ACCESS_KEY_ID" ]; then
            echo "FAIL: expected AWS_ACCESS_KEY_ID to be cleared, but it is still set"
            exit 1
          fi
          if [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "FAIL: expected AWS_SECRET_ACCESS_KEY to be cleared, but it is still set"
            exit 1
          fi
          if [ -n "$AWS_SESSION_TOKEN" ]; then
            echo "FAIL: expected AWS_SESSION_TOKEN to be cleared, but it is still set"
            exit 1
          fi
          echo "PASS: old credentials were successfully cleared"
