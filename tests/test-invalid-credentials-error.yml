name: Test invalid credentials produce auth error (not input error)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY

      - name: Assert action ran (failed at AWS API, not at input validation)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because the credentials are fake (AWS auth error),
          # not because of missing required inputs. Either 'success' or 'failure' is
          # acceptable here — what matters is the action ran without crashing on input
          # validation. A 'skipped' outcome would indicate the action never ran.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped — it never ran"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"
