name: Test disable-retry with invalid credentials fails fast
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-west-2"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          disable-retry: "true"
          retry-max-attempts: "1"

      - name: Assert action failed (invalid credentials rejected)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials"

      - name: Assert AWS_REGION was exported before failure
        run: |
          echo "AWS_REGION: $AWS_REGION"
          if [ "$AWS_REGION" != "us-west-2" ]; then
            echo "FAIL: expected AWS_REGION to be 'us-west-2', got '$AWS_REGION'"
            exit 1
          fi
          echo "PASS: AWS_REGION correctly set to us-west-2"
