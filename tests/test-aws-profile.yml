name: Test AWS profile inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start mock STS server
        run: |
          python3 -c "
          import http.server, threading, textwrap

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  body = textwrap.dedent('''
                      <GetCallerIdentityResponse xmlns=\"https://sts.amazonaws.com/doc/2011-06-15/\">
                        <GetCallerIdentityResult>
                          <Arn>arn:aws:iam::123456789012:user/test</Arn>
                          <UserId>AKIAIOSFODNN7EXAMPLE</UserId>
                          <Account>123456789012</Account>
                        </GetCallerIdentityResult>
                        <ResponseMetadata>
                          <RequestId>01234567-89ab-cdef-0123-456789abcdef</RequestId>
                        </ResponseMetadata>
                      </GetCallerIdentityResponse>
                  ''').strip().encode()
                  self.send_response(200)
                  self.send_header('Content-Type', 'text/xml')
                  self.send_header('Content-Length', str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, fmt, *args):
                  pass

          server = http.server.HTTPServer(('127.0.0.1', 4566), Handler)
          t = threading.Thread(target=server.serve_forever)
          t.daemon = True
          t.start()
          import time; time.sleep(86400)
          " &
          sleep 1
          echo "Mock STS server started"

      - id: configure-aws
        uses: .
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          aws-profile: my-test-profile
          overwrite-aws-profile: 'true'
          output-env-credentials: 'true'
          sts-endpoint: http://127.0.0.1:4566

      - name: Assert AWS credentials file was created with profile
        run: |
          echo "Checking ~/.aws/credentials for profile..."
          if [ ! -f "$HOME/.aws/credentials" ]; then
            echo "FAIL: expected ~/.aws/credentials to exist"
            exit 1
          fi
          if ! grep -q "\[my-test-profile\]" "$HOME/.aws/credentials"; then
            echo "FAIL: expected [my-test-profile] section in ~/.aws/credentials"
            cat "$HOME/.aws/credentials"
            exit 1
          fi
          echo "PASS: profile found in credentials file"

      - name: Assert AWS_DEFAULT_REGION is set
        run: |
          echo "AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION"
          if [ "$AWS_DEFAULT_REGION" != "us-east-1" ]; then
            echo "FAIL: expected AWS_DEFAULT_REGION=us-east-1, got '$AWS_DEFAULT_REGION'"
            exit 1
          fi
          echo "PASS"
