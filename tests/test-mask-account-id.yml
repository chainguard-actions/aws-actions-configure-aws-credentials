name: Test mask-aws-account-id option
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: configure-aws
        name: Configure AWS credentials with mask-aws-account-id (fake - expected to fail at STS)
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          mask-aws-account-id: true

      - name: Assert action ran (failed due to invalid credentials, not config error)
        env:
          OUTCOME: ${{ steps.configure-aws.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action ran with mask-aws-account-id option and correctly failed at credential validation"
