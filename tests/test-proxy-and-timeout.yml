name: Test http-proxy, no-proxy, and action-timeout-s inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with proxy and timeout inputs
        id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          http-proxy: "http://proxy.example.com:3128"
          no-proxy: "localhost,127.0.0.1,.example.com"
          action-timeout-s: "30"
          disable-retry: "true"

      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should attempt to run (and fail at AWS API with fake creds).
          # A 'skipped' outcome means the action never started — that would be a bug.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped — it never ran"
            exit 1
          fi
          echo "PASS: action ran with http-proxy, no-proxy, and action-timeout-s inputs (outcome=$OUTCOME)"
