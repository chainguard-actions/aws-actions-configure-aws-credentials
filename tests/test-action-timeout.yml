name: Test action timeout feature
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          role-to-assume: "arn:aws:iam::123456789012:role/TestRole"
          action-timeout-s: "1"
          disable-retry: "true"
          retry-max-attempts: "1"
      - name: Assert action failed (either timeout or credential error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (timeout or credential error), but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed (timeout or invalid credentials as expected)"
