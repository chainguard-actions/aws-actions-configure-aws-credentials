name: Test role assumption without credentials source
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with role but no credentials source
        id: action
        uses: .
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::123456789012:role/MyRole
          disable-retry: "true"
          force-skip-oidc: "true"
        continue-on-error: true
      - name: Assert action failed without credentials source
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when role-to-assume is set but no credentials source is available, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when no credentials source was available for role assumption"
