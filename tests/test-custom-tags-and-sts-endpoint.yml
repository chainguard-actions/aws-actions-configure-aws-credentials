name: Test custom-tags and sts-endpoint inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          aws-access-key-id: "AKIAIOSFODNN7EXAMPLE"
          aws-secret-access-key: "wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY"
          role-to-assume: "arn:aws:iam::123456789012:role/TestRole"
          custom-tags: '{"Environment":"test","Team":"platform"}'
          sts-endpoint: "https://sts.us-east-1.amazonaws.com"
          disable-retry: "true"
          retry-max-attempts: "1"
      - name: Assert action ran with custom-tags and sts-endpoint inputs
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Action will fail due to fake credentials, but it should have accepted the inputs
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake credentials, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly processed custom-tags and sts-endpoint inputs"
