name: Test force-skip-oidc validation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          role-to-assume: arn:aws:iam::123456789012:role/MyRole
          force-skip-oidc: "true"
          # Intentionally omitting aws-access-key-id and web-identity-token-file
          # This should fail because force-skip-oidc requires one of those when role-to-assume is set

      - name: Assert action failed
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when force-skip-oidc is true without required inputs, but got outcome '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed when force-skip-oidc is true without aws-access-key-id or web-identity-token-file"
