name: Test web-identity-token-file input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create fake web identity token file
        run: |
          echo "fake-web-identity-token-content" > /tmp/web-identity-token.txt
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: "us-east-1"
          role-to-assume: "arn:aws:iam::123456789012:role/TestRole"
          web-identity-token-file: "/tmp/web-identity-token.txt"
          disable-retry: "true"
          retry-max-attempts: "1"
      - name: Assert action ran with web-identity-token-file input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Action will fail due to fake token, but it should have accepted the inputs
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with fake web identity token, but outcome was '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly processed web-identity-token-file input"
