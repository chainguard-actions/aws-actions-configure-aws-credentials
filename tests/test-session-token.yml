name: Test session token and web identity inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create fake web identity token file
        run: |
          echo "fake-web-identity-token" > /tmp/web-identity-token.txt

      - id: configure-aws
        name: Configure AWS credentials with session token and web identity inputs (expected to fail)
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          aws-session-token: AQoXnyc4lcK4w4OIaYmvSoVrTer19v0cYZ62sw8gnQDVc29/00xELe/ov5vU1t1M
          web-identity-token-file: /tmp/web-identity-token.txt

      - name: Assert action ran (failed due to invalid credentials)
        env:
          OUTCOME: ${{ steps.configure-aws.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials when session token inputs are provided"
