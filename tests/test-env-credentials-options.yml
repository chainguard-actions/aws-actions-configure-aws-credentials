name: Test output-env-credentials, unset-current-credentials, disable-retry, retry-max-attempts
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start mock STS server
        run: |
          mkdir -p /tmp/mock-sts
          cat > /tmp/mock-sts/server.py << 'EOF'
          import http.server
          import socketserver

          RESPONSE = """<?xml version="1.0" encoding="UTF-8"?>
          <GetCallerIdentityResponse xmlns="https://sts.amazonaws.com/doc/2011-06-15/">
            <GetCallerIdentityResult>
              <Arn>arn:aws:iam::123456789012:user/test-user</Arn>
              <UserId>AKIAIOSFODNN7EXAMPLE</UserId>
              <Account>123456789012</Account>
            </GetCallerIdentityResult>
            <ResponseMetadata>
              <RequestId>01234567-89ab-cdef-0123-456789abcdef</RequestId>
            </ResponseMetadata>
          </GetCallerIdentityResponse>"""

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length)
                  self.send_response(200)
                  self.send_header('Content-Type', 'text/xml')
                  self.end_headers()
                  self.wfile.write(RESPONSE.encode())
              def log_message(self, format, *args):
                  pass

          with socketserver.TCPServer(("", 4570), Handler) as httpd:
              httpd.serve_forever()
          EOF
          python3 /tmp/mock-sts/server.py &
          sleep 1
          echo "Mock STS server started on port 4570"

      - id: action
        uses: .
        with:
          aws-region: us-west-2
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          sts-endpoint: http://localhost:4570
          mask-aws-account-id: "false"
          output-env-credentials: "true"
          unset-current-credentials: "false"
          disable-retry: "true"
          retry-max-attempts: "3"

      - name: Assert AWS_REGION is set to us-west-2
        run: |
          echo "AWS_REGION: $AWS_REGION"
          if [ "$AWS_REGION" != "us-west-2" ]; then
            echo "FAIL: expected AWS_REGION to be 'us-west-2', got '$AWS_REGION'"
            exit 1
          fi
          echo "PASS: AWS_REGION is correctly set to us-west-2"

      - name: Assert AWS_ACCESS_KEY_ID is set (output-env-credentials=true)
        run: |
          echo "AWS_ACCESS_KEY_ID is set: $([ -n "$AWS_ACCESS_KEY_ID" ] && echo yes || echo no)"
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "FAIL: expected AWS_ACCESS_KEY_ID to be set when output-env-credentials=true"
            exit 1
          fi
          echo "PASS: AWS_ACCESS_KEY_ID is set"
