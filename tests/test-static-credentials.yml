name: Test static credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      localstack:
        image: localstack/localstack:3.8.0
        ports:
          - 4566:4566
        env:
          SERVICES: sts
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          aws-region: us-east-1
          aws-access-key-id: test
          aws-secret-access-key: testsecretkey1234567890
          aws-session-token: testtoken
          mask-aws-account-id: "false"
          output-credentials: "true"
          output-env-credentials: "true"
          unset-current-credentials: "false"
          disable-retry: "true"
          retry-max-attempts: "3"
          sts-endpoint: http://localhost:4566
        env:
          AWS_SKIP_CLEANUP_STEP: "true"

      - name: Assert aws-account-id output is set
        env:
          ACTUAL: ${{ steps.action.outputs.aws-account-id }}
        run: |
          echo "actual aws-account-id: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: aws-account-id output was empty"
            exit 1
          fi
          echo "PASS"

      - name: Assert AWS_REGION env var is set
        run: |
          echo "AWS_REGION: $AWS_REGION"
          if [ -z "$AWS_REGION" ]; then
            echo "FAIL: AWS_REGION env var was not set"
            exit 1
          fi
          echo "PASS"
