name: Test static credentials inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          aws-session-token: AQoDYXdzEJr//fake-session-token
          mask-aws-account-id: "false"
          output-credentials: "true"
          output-env-credentials: "true"
          unset-current-credentials: "false"
          disable-retry: "true"
          retry-max-attempts: "3"
          force-skip-oidc: "true"
          action-timeout-s: "30"
          http-proxy: ""
          no-proxy: ""
          allowed-account-ids: ""
          use-existing-credentials: "false"
          special-characters-workaround: "false"
      - name: Assert action ran (may fail due to invalid credentials, that is expected)
        run: |
          echo "Action outcome: ${{ steps.action.outcome }}"
          # The action will fail because the credentials are fake, but we just need
          # to verify the inputs were accepted (not rejected as unknown inputs).
          # A failure due to invalid credentials is acceptable here.
          echo "PASS: inputs were accepted by the action"
