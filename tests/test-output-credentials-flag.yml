name: Test output-credentials flag is accepted as valid input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: eu-west-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          output-credentials: "true"
          mask-aws-account-id: "false"

      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should attempt to run (and fail at AWS API with fake creds).
          # A 'skipped' outcome means the action never started — that would be a bug.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped — it never ran"
            exit 1
          fi
          echo "PASS: action ran with output-credentials flag (outcome=$OUTCOME)"
