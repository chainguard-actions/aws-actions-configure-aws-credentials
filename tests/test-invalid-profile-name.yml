name: Test invalid AWS profile name
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run action with invalid profile name containing whitespace
        id: action
        uses: .
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          aws-profile: "invalid profile name"
          disable-retry: "true"
        continue-on-error: true
      - name: Assert action failed due to invalid profile name
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid profile name (contains whitespace), got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly rejected profile name containing whitespace"
