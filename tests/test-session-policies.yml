name: Test session policies and role chaining inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Start mock STS server
        run: |
          python3 -c "
          import http.server, threading, textwrap, urllib.parse

          class Handler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  length = int(self.headers.get('Content-Length', 0))
                  body_bytes = self.rfile.read(length)
                  body_str = body_bytes.decode()
                  params = urllib.parse.parse_qs(body_str)
                  action = params.get('Action', [''])[0]
                  if action == 'AssumeRole':
                      body = textwrap.dedent('''
                          <AssumeRoleResponse xmlns=\"https://sts.amazonaws.com/doc/2011-06-15/\">
                            <AssumeRoleResult>
                              <Credentials>
                                <AccessKeyId>ASIAIOSFODNN7EXAMPLE</AccessKeyId>
                                <SecretAccessKey>wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY</SecretAccessKey>
                                <SessionToken>AQoDYXdzEJr//////////wEaoAK1wvxJY12r2ILDExampleSessionToken</SessionToken>
                                <Expiration>2099-01-01T00:00:00Z</Expiration>
                              </Credentials>
                              <AssumedRoleUser>
                                <Arn>arn:aws:sts::123456789012:assumed-role/test-role/chained-session</Arn>
                                <AssumedRoleId>AROAIOSFODNN7EXAMPLE:chained-session</AssumedRoleId>
                              </AssumedRoleUser>
                            </AssumeRoleResult>
                            <ResponseMetadata>
                              <RequestId>01234567-89ab-cdef-0123-456789abcdef</RequestId>
                            </ResponseMetadata>
                          </AssumeRoleResponse>
                      ''').strip().encode()
                  else:
                      body = textwrap.dedent('''
                          <GetCallerIdentityResponse xmlns=\"https://sts.amazonaws.com/doc/2011-06-15/\">
                            <GetCallerIdentityResult>
                              <Arn>arn:aws:iam::123456789012:user/test</Arn>
                              <UserId>AKIAIOSFODNN7EXAMPLE</UserId>
                              <Account>123456789012</Account>
                            </GetCallerIdentityResult>
                            <ResponseMetadata>
                              <RequestId>01234567-89ab-cdef-0123-456789abcdef</RequestId>
                            </ResponseMetadata>
                          </GetCallerIdentityResponse>
                      ''').strip().encode()
                  self.send_response(200)
                  self.send_header('Content-Type', 'text/xml')
                  self.send_header('Content-Length', str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, fmt, *args):
                  pass

          server = http.server.HTTPServer(('127.0.0.1', 4566), Handler)
          t = threading.Thread(target=server.serve_forever)
          t.daemon = True
          t.start()
          import time; time.sleep(86400)
          " &
          sleep 1
          echo "Mock STS server started"

      - name: Set up initial credentials for role chaining
        run: |
          echo "AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" >> $GITHUB_ENV

      - id: configure-aws
        uses: .
        with:
          aws-region: us-west-2
          role-to-assume: arn:aws:iam::123456789012:role/chained-role
          role-chaining: 'true'
          inline-session-policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"s3:GetObject","Resource":"*"}]}'
          managed-session-policies: 'arn:aws:iam::aws:policy/ReadOnlyAccess'
          sts-endpoint: http://127.0.0.1:4566

      - name: Assert AWS_DEFAULT_REGION is set
        run: |
          echo "AWS_DEFAULT_REGION: $AWS_DEFAULT_REGION"
          if [ "$AWS_DEFAULT_REGION" != "us-west-2" ]; then
            echo "FAIL: expected AWS_DEFAULT_REGION=us-west-2, got '$AWS_DEFAULT_REGION'"
            exit 1
          fi
          echo "PASS"

      - name: Assert assumed role credentials are set
        run: |
          echo "AWS_ACCESS_KEY_ID is set: $([ -n "$AWS_ACCESS_KEY_ID" ] && echo yes || echo no)"
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "FAIL: expected AWS_ACCESS_KEY_ID to be set after role chaining"
            exit 1
          fi
          echo "PASS"
