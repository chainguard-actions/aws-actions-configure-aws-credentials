name: Test aws-session-token, output-env-credentials, and allowed-account-ids inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action with session token, env output, and allowed-account-ids inputs
        id: action
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          aws-session-token: AQoDYXdzEJr//fake-session-token-for-testing
          output-env-credentials: "true"
          allowed-account-ids: "123456789012,987654321098"
          disable-retry: "true"

      - name: Assert action ran (not skipped)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should attempt to run (and fail at AWS API with fake creds).
          # A 'skipped' outcome means the action never started — that would be a bug.
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped — it never ran"
            exit 1
          fi
          echo "PASS: action ran with aws-session-token, output-env-credentials, and allowed-account-ids inputs (outcome=$OUTCOME)"
