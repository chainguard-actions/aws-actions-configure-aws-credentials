name: Test session policy and proxy inputs
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: configure-aws
        name: Configure AWS credentials with session policy inputs (expected to fail at STS)
        uses: .
        continue-on-error: true
        with:
          aws-region: us-east-1
          aws-access-key-id: AKIAIOSFODNN7EXAMPLE
          aws-secret-access-key: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          role-to-assume: arn:aws:iam::123456789012:role/TestRole
          http-proxy: ""
          inline-session-policy: '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":"s3:GetObject","Resource":"*"}]}'
          managed-session-policies: arn:aws:iam::aws:policy/ReadOnlyAccess

      - name: Assert action ran (failed due to invalid credentials)
        env:
          OUTCOME: ${{ steps.configure-aws.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail with invalid credentials, got '$OUTCOME'"
            exit 1
          fi
          echo "PASS: action correctly failed with invalid credentials when session policy inputs are provided"
