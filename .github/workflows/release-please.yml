---
  name: Release Please
  on:
    push:
      branches:
        - main
    workflow_dispatch:

  permissions:
    id-token: write
    contents: write
    pull-requests: write

  jobs:
    release-please:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout Repository
          uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
          with:
            fetch-depth: 0

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6
          with:
            aws-region: us-west-2
            role-to-assume: ${{ secrets.SECRETS_AWS_PACKAGING_ROLE_TO_ASSUME }}
            role-duration-seconds: 900
            role-session-name: ${{ github.run_id }}

        - name: Get git credentials
          uses: aws-actions/aws-secretsmanager-get-secrets@a9a7eb4e2f2871d30dc5b892576fde60a2ecc802 # v2
          with:
            parse-json-secrets: true
            secret-ids: |
              ${{ secrets.OSDS_PACKAGING_ROLE }}

        - name: Run release-please
          id: release
          uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4
          with:
            release-type: node
            token: ${{ env.OSDS_ACCESS_TOKEN }}
            config-file: release-please-config.json
            manifest-file: .release-please-manifest.json

        - name: Checkout Again
          uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
          with:
            fetch-depth: 0
            persist-credentials: false

        - name: Tag Major Version
          if: ${{ steps.release.outputs.release_created }}
          env:
            OSDS_ACCESS_TOKEN: ${{ env.OSDS_ACCESS_TOKEN }}
            RELEASE_MAJOR: ${{ steps.release.outputs.major }}
          run: |
            git config user.name "GitHub Actions"
            git config user.email "github-aws-sdk-osds-automation@amazon.com"
            echo "::add-mask::$OSDS_ACCESS_TOKEN"
            git remote set-url origin "https://$OSDS_ACCESS_TOKEN@github.com/aws-actions/configure-aws-credentials.git"
            if git rev-parse "v$RELEASE_MAJOR" >/dev/null 2>&1; then
              git tag -d "v$RELEASE_MAJOR"
              git push origin ":v$RELEASE_MAJOR"
            fi
            git tag -a "v$RELEASE_MAJOR" -m "Release v$RELEASE_MAJOR"
            git push origin "v$RELEASE_MAJOR"

        - name: Update README version references
          if: ${{ steps.release.outputs.release_created }}
          env:
            OSDS_ACCESS_TOKEN: ${{ env.OSDS_ACCESS_TOKEN }}
            RELEASE_TAG_NAME: ${{ steps.release.outputs.tag_name }}
          run: |
            sed -i "s|configure-aws-credentials@v[0-9]*\.[0-9]*\.[0-9]*|configure-aws-credentials@$RELEASE_TAG_NAME|g" README.md
            if git diff --quiet README.md; then
              echo "README already up to date"
            else
              echo "::add-mask::$OSDS_ACCESS_TOKEN"
              git remote set-url origin "https://$OSDS_ACCESS_TOKEN@github.com/aws-actions/configure-aws-credentials.git"
              git add README.md
              git commit -m "docs: update README version references to $RELEASE_TAG_NAME"
              git push --force origin
            fi
